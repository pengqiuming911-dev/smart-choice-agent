services:
  wiki_service:
    build:
      context: ./wiki_service
      dockerfile: Dockerfile
    container_name: wiki-service
    environment:
      - FEISHU_APP_ID=${FEISHU_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - WIKI_REPO_PATH=/app/wiki_repo
      - TZ=Asia/Shanghai
    volumes:
      - ./wiki_service/wiki_repo:/app/wiki_repo
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wiki-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=http://wiki_service:8080
    restart: unless-stopped
    depends_on:
      - wiki_service