version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: pe-kb-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: pe-kb-postgres
    environment:
      POSTGRES_USER: pekb
      POSTGRES_PASSWORD: pekb_dev_password
      POSTGRES_DB: pekb
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pe-kb-redis
    ports:
      - "6379:6379"
    restart: unless-stopped